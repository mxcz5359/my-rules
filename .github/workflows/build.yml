name: Build MRS Rules

on:
push:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - name: Install Mihomo
    run: |
      wget https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64.gz
      gunzip mihomo-linux-amd64.gz
      chmod +x mihomo-linux-amd64
      mv mihomo-linux-amd64 mihomo

  - name: Convert
    run: |
      ./mihomo convert-ruleset domain text domain.txt domain.mrs
      ./mihomo convert-ruleset ipcidr text ipcidr.txt ipcidr.mrs

  - name: Push
    run: |
      git config --global user.name github-actions
      git config --global user.email actions@github.com
      git add *.mrs
      git commit -m "update" || echo done
      git push
