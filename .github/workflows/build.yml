name: Build MRS Rules

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Install Mihomo
    run: |
      wget https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64.gz
      gunzip mihomo-linux-amd64.gz
      chmod +x mihomo-linux-amd64
      mv mihomo-linux-amd64 mihomo

  - name: Convert rules
    run: |
      ./mihomo convert-ruleset domain text domain.txt domain.mrs
      ./mihomo convert-ruleset ipcidr text ipcidr.txt ipcidr.mrs

  - name: Commit result
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"
      git add *.mrs
      git commit -m "update mrs" || echo "no changes"
      git push
